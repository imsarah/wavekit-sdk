name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · build · test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build packages
        run: npm run build

      - name: Test
        run: npm test

      - name: Build demo (Next.js)
        run: npm run build --workspace wavekit-demo
        env:
          NEXT_TELEMETRY_DISABLED: '1'
